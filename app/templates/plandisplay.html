{% extends "base.html" %}
{% block content %}

<div class="container mt-5">
    <h2>
        The Plans list here
    </h2>

    {% if plans %}
        <table class="table table-hover mt-4">
            <thead class="table-light">
                <tr>
                    <th>The Plan Title</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                {% for plan in plans %}
                <tr>
                    <td>
                        <a href="{{ url_for('index', planid=plan.id) }}" class="text-decoration-none fw-bold">
                            {{ plan.title }}
                        </a>
                    </td>
                    <td>
                        {% if plan.is_archived %}
                            <span class="badge bg-secondary">Archived</span>
                        {% else %}
                            <span class="badge bg-success">UnAechived</span>
                        {% endif %}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    {% else %}
        <div class="alert alert-info mt-4">
            No plans under such status
        </div>
    {% endif %}
</div>

{% endblock %}
